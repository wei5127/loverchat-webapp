<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>付款成功｜人生練習場</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #fff7fb 0%, #f8efff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    
    .card { background: white; border-radius: 24px; padding: 48px; width: 100%; max-width: 480px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
    
    .icon { width: 80px; height: 80px; background: linear-gradient(135deg, #10B981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 40px; }
    
    h1 { font-size: 32px; margin-bottom: 16px; }
    p { color: #75687f; font-size: 16px; line-height: 1.6; margin-bottom: 12px; }
    
    .plan-info { background: #f8efff; border-radius: 16px; padding: 20px; margin: 24px 0; text-align: left; }
    .plan-info h3 { font-size: 18px; margin-bottom: 8px; color: #9a79ef; }
    .plan-info p { font-size: 14px; margin-bottom: 0; }
    
    .btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #f56fa8, #9a79ef); color: white; text-decoration: none; border-radius: 25px; font-size: 16px; font-weight: 600; margin-top: 16px; transition: transform 0.2s; }
    .btn:hover { transform: scale(1.05); }
    
    .loading { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #eadbea; border-top-color: #f56fa8; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="content">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>驗證付款中...</p>
    </div>
  </div>
  
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyBgCHhpBgJofh6fuEnFcy1CdQYxlCV-OUQ",
      authDomain: "loverchat-88cb3.firebaseapp.com",
      projectId: "loverchat-88cb3",
      storageBucket: "loverchat-88cb3.firebasestorage.app",
      messagingSenderId: "726884368190",
      appId: "1:726884368190:web:897b286fde11396928766f"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const functions = getFunctions(app);
    
    // Get session_id from URL
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');
    
    function showSuccess(planName) {
      const planNames = {
        vip: 'VIP 月費會員',
        lifetime: '終身會員',
        free: '免費會員'
      };
      
      document.getElementById('content').innerHTML = `
        <div class="icon">✓</div>
        <h1>付款成功！</h1>
        <p>感謝你的支持，你已升級為 <strong>${planNames[planName] || planName}</strong></p>
        <div class="plan-info">
          <h3>✨ 享受以下功能</h3>
          <p>• 每日訊息無上限</p>
          <p>• 所有角色開放</p>
          <p>• 建立私人與公開角色</p>
          <p>• 長期聊天記憶</p>
        </div>
        <p style="font-size: 14px; color: #75687f;">請重新整理頁面以啟用新功能</p>
        <a href="index.html" class="btn">開始聊天</a>
      `;
      
      if (typeof gtag === 'function') {
        gtag('event', 'payment_success', { plan: planName });
      }
    }
    
    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="icon" style="background: linear-gradient(135deg, #ef4444, #dc2626);">✗</div>
        <h1>付款驗證失敗</h1>
        <p>${message || '無法驗證付款狀態，請聯繫客服'</p>
        <a href="pricing.html" class="btn">返回方案頁</a>
      `;
    }
    
    // Wait for auth then verify
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        showError('請先登入');
        return;
      }
      
      if (!sessionId) {
        showError('找不到付款記錄');
        return;
      }
      
      try {
        // Refresh user status from Cloud Function
        const getStatus = httpsCallable(functions, 'getUserStatus');
        const result = await getStatus({});
        
        if (result.data?.plan === 'vip' || result.data?.plan === 'lifetime') {
          showSuccess(result.data.plan);
        } else {
          showSuccess('vip'); // Default to VIP since we don't know which was purchased
        }
      } catch (error) {
        console.error('Verification error:', error);
        // Show success anyway since payment went through Stripe
        showSuccess('vip');
      }
    });
  </script>
</body>
</html>
