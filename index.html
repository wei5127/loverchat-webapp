    async function toggleFavorite(category, charName) {
      if (!auth.currentUser) {
        alert(currentLang === 'en' ? 'Please login to save favorites' : '請先登入才能收藏角色');
        return;
      }
      const charId = `${category}:${charName}`;
      const isFav = favorites.includes(charId);
      try {
        const userRef = doc(db, 'users', auth.currentUser.uid, 'data', 'favorites');
        if (isFav) {
          // Remove from favorites
          favorites = favorites.filter(f => f !== charId);
          await updateDoc(userRef, { characters: arrayRemove(charId) });
        } else {
          // Add to favorites
          favorites.push(charId);
          await setDoc(userRef, { characters: arrayUnion(charId) }, { merge: true });
        }
        // Update UI
        updateFavoriteButtons();
      } catch (e) {
        console.error('Failed to toggle favorite:', e);
      }
    }

    // Auth state listener - with DOM ready check and robust error handling
    function setupAuthListener() {
      try {

        console.log('Setting up auth listener, auth available:', typeof auth !== 'undefined');
        
        if (typeof auth === 'undefined') {
          console.error('Firebase auth not initialized');
          return;
        }
        
        // First, check immediately if user is already logged in
        currentUser = auth.currentUser;
        if (currentUser) {
          console.log('User already logged in:', currentUser.uid);
          handleAuthStateChange(currentUser);
        }
        
        // Then set up the listener for future changes
        onAuthStateChanged(auth, async (user) => {
          console.log('Auth state changed:', user ? 'logged in' : 'logged out');
          handleAuthStateChange(user);
        });
      } catch (error) {
        console.error('Auth listener setup error:', error);
      }
    }
    
    function handleAuthStateChange(user) {
      try {
        currentUser = user;
        const navAccount = document.getElementById('navAccount');
        const navLogin = document.getElementById('navLogin');
        const navLogout = document.getElementById('navLogout');
        
        if (user) {
          console.log('User logged in:', user.uid, user.isAnonymous ? '(anonymous)' : user.email);
          
          // Show/hide nav items based on auth - IMMEDIATELY
          if (navAccount) navAccount.style.display = '';
          if (navLogin) navLogin.style.display = 'none';

          if (navLogin) navLogin.style.display = '';
          if (navLogout) navLogout.style.display = 'none';
        }
      } catch (error) {
        // Firebase Auth network errors are common and self-healing
        if (error.code === 'auth/network-request-failed') {
          console.warn('Auth network error (will retry):', error.message);
        } else {
          console.error('handleAuthStateChange error:', error);
        }
      }
    }
