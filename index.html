<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>寶貝 Chat</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="寶貝角色聊天 web app">
  <style>
    :root {
      --bg: #fff7fb;
      --bg-2: #f8efff;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-solid: #ffffff;
      --text: #30263b;
      --muted: #75687f;
      --line: #eadbea;
      --pink: #f56fa8;
      --pink-dark: #c93d78;
      --purple: #9a79ef;
      --lilac: #eee7ff;
      --mint: #d8f7ee;
      --peach: #ffe4d7;
      --shadow: 0 16px 50px rgba(133, 85, 144, 0.17);
      --radius: 8px;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(245, 111, 168, 0.22), transparent 28rem),
        radial-gradient(circle at 92% 8%, rgba(154, 121, 239, 0.20), transparent 26rem),
        linear-gradient(135deg, var(--bg), var(--bg-2) 60%, #f3fffb);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem clamp(1rem, 3vw, 2rem);
      border-bottom: 1px solid rgba(234, 219, 234, 0.82);
      background: rgba(255, 247, 251, 0.82);
      backdrop-filter: blur(18px);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      min-width: 0;
    }

    .brand-mark {
      width: 2.45rem;
      height: 2.45rem;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 10px 24px rgba(245, 111, 168, 0.26);
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 0.18rem;
      color: var(--muted);
      font-size: 0.79rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 58vw;
    }

    .ghost-button,
    .primary-button,
    .icon-button {
      border: 1px solid transparent;
      border-radius: var(--radius);
      min-height: 2.5rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .ghost-button {
      padding: 0 0.9rem;
      color: var(--pink-dark);
      border-color: rgba(245, 111, 168, 0.32);
      background: rgba(255, 255, 255, 0.68);
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0 1rem;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 12px 26px rgba(154, 121, 239, 0.22);
    }

    .icon-button {
      width: 2.65rem;
      display: inline-grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 12px 24px rgba(154, 121, 239, 0.18);
    }

    .ghost-button:hover,
    .primary-button:hover,
    .icon-button:hover {
      transform: translateY(-1px);
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: clamp(1rem, 3vw, 2rem);
      display: grid;
      align-items: stretch;
    }

    .screen {
      display: none;
      min-height: calc(100vh - 5.5rem);
    }

    .screen.active {
      display: grid;
      animation: enter 0.22s ease both;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome {
      align-content: center;
      gap: 1.5rem;
      max-width: 830px;
      margin: 0 auto;
      text-align: center;
    }

    .welcome-art {
      width: min(390px, 78vw);
      aspect-ratio: 1.5;
      margin: 0 auto;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.26)),
        radial-gradient(circle at 28% 35%, #ffd1e4 0 18%, transparent 19%),
        radial-gradient(circle at 68% 42%, #ded3ff 0 22%, transparent 23%),
        radial-gradient(circle at 50% 78%, #d8f7ee 0 20%, transparent 21%),
        linear-gradient(145deg, #fff, #f7edff);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.85);
    }

    .welcome-art::before,
    .welcome-art::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 12px 26px rgba(133, 85, 144, 0.12);
    }

    .welcome-art::before {
      width: 58%;
      height: 20%;
      left: 14%;
      top: 25%;
    }

    .welcome-art::after {
      width: 42%;
      height: 16%;
      right: 12%;
      bottom: 23%;
    }

    .welcome h2 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.3rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .welcome p {
      margin: 0 auto;
      max-width: 660px;
      color: var(--muted);
      font-size: clamp(1.06rem, 2.1vw, 1.35rem);
      line-height: 1.7;
    }

    .selection {
      align-content: start;
      gap: 1.1rem;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      letter-spacing: 0;
    }

    .section-head p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(178px, 1fr));
      gap: 0.85rem;
      align-items: stretch;
    }

    .choice {
      min-height: 7.4rem;
      padding: 1rem;
      text-align: left;
      border: 1px solid rgba(234, 219, 234, 0.92);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 26px rgba(133, 85, 144, 0.08);
      color: var(--text);
    }

    .choice:hover,
    .choice:focus-visible {
      outline: none;
      border-color: rgba(245, 111, 168, 0.55);
      box-shadow: 0 14px 32px rgba(245, 111, 168, 0.16);
      transform: translateY(-1px);
    }

    .choice strong {
      display: block;
      font-size: 1.04rem;
      line-height: 1.25;
      word-break: keep-all;
    }

    .choice span {
      display: block;
      margin-top: 0.55rem;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.9rem;
    }

    .crumbs {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .crumbs button {
      border: 0;
      padding: 0;
      color: var(--pink-dark);
      background: transparent;
    }

    .chat-screen {
      min-height: calc(100vh - 7.5rem);
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      border: 1px solid rgba(234, 219, 234, 0.85);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: var(--shadow);
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid rgba(234, 219, 234, 0.9);
      background: rgba(255, 255, 255, 0.72);
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }

    .avatar {
      width: 2.65rem;
      height: 2.65rem;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      font-weight: 800;
      flex: 0 0 auto;
    }

    .chat-title h2 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-title p {
      margin: 0.16rem 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(56vw, 520px);
    }

    .chat-actions {
      display: flex;
      gap: 0.45rem;
      flex: 0 0 auto;
    }

    .messages {
      min-height: 22rem;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      background:
        linear-gradient(rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.3)),
        repeating-linear-gradient(45deg, transparent 0 18px, rgba(245, 111, 168, 0.035) 18px 19px);
    }

    .message-row {
      display: grid;
      gap: 0.25rem;
      max-width: min(78%, 670px);
    }

    .message-row.user {
      align-self: flex-end;
    }

    .message-row.bot {
      align-self: flex-start;
    }

    .bubble {
      padding: 0.72rem 0.88rem;
      border-radius: 17px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: 0 8px 20px rgba(133, 85, 144, 0.08);
    }

    .user .bubble {
      color: #fff;
      border-bottom-right-radius: 5px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
    }

    .bot .bubble {
      color: var(--text);
      border: 1px solid rgba(234, 219, 234, 0.85);
      border-bottom-left-radius: 5px;
      background: rgba(255, 255, 255, 0.92);
    }

    .meta {
      padding: 0 0.2rem;
      color: var(--muted);
      font-size: 0.72rem;
    }

    .user .meta {
      text-align: right;
    }

    .typing {
      width: fit-content;
      padding: 0.65rem 0.78rem;
      border: 1px solid rgba(234, 219, 234, 0.85);
      border-radius: 16px 16px 16px 5px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
    }

    .typing span {
      display: inline-block;
      width: 0.38rem;
      height: 0.38rem;
      margin: 0 0.08rem;
      border-radius: 999px;
      background: currentColor;
      animation: pulse 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.14s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.28s;
    }

    @keyframes pulse {
      0%, 70%, 100% {
        transform: translateY(0);
        opacity: 0.35;
      }
      35% {
        transform: translateY(-3px);
        opacity: 1;
      }
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.65rem;
      padding: 0.85rem;
      border-top: 1px solid rgba(234, 219, 234, 0.9);
      background: rgba(255, 255, 255, 0.8);
    }

    .composer input {
      width: 100%;
      min-height: 2.65rem;
      border: 1px solid rgba(234, 219, 234, 0.95);
      border-radius: var(--radius);
      padding: 0 0.9rem;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .composer input:focus {
      border-color: rgba(245, 111, 168, 0.62);
      box-shadow: 0 0 0 4px rgba(245, 111, 168, 0.13);
    }

    .helper {
      padding: 0 0.2rem;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .lang-switch {
      position: relative;
      display: inline-block;
    }

    .lang-switch-btn {
      padding: 0 0.6rem;
      height: 2.2rem;
      font-size: 0.78rem;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .lang-switch-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: var(--purple);
    }

    .lang-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.35rem;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 110px;
      z-index: 100;
      overflow: hidden;
    }

    .lang-dropdown button {
      width: 100%;
      padding: 0.55rem 0.8rem;
      text-align: left;
      font-size: 0.82rem;
      color: var(--text);
      background: none;
      border: none;
      cursor: pointer;
    }

    .lang-dropdown button:hover {
      background: var(--lilac);
    }

    .lang-dropdown button.active {
      color: var(--purple);
      font-weight: 600;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 720px) {
      .topbar {
        padding: 0.75rem 0.85rem;
      }

      .brand span {
        max-width: 45vw;
      }

      .shell {
        padding: 0.85rem;
      }

      .screen {
        min-height: calc(100vh - 4.7rem);
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .choice {
        min-height: 6.2rem;
      }

      .chat-screen {
        min-height: calc(100vh - 6rem);
        border-radius: 10px;
      }

      .message-row {
        max-width: 90%;
      }

      .chat-header {
        align-items: start;
      }

      .ghost-button {
        padding: 0 0.72rem;
      }

      .chat-actions .ghost-button {
        min-height: 2.25rem;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand" aria-label="寶貝 Chat">
        <div class="brand-mark" aria-hidden="true">寶</div>
        <div>
          <h1>寶貝 Chat</h1>
          <span>想說什麼就說什麼</span>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="lang-switch">
          <button class="lang-switch-btn" id="langSwitchBtn" type="button">
            <span id="currentLang">繁體中文</span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <div class="lang-dropdown hidden" id="langDropdown">
            <button data-lang="zh-TW">繁體中文</button>
            <button data-lang="zh-CN">簡體中文</button>
            <button data-lang="en">English</button>
          </div>
        </div>
        <button class="ghost-button" id="topMenuButton" type="button">選角色</button>
      </div>
    </header>

    <main class="shell">
      <section class="screen welcome active" id="welcomeScreen" aria-labelledby="welcomeTitle">
        <div class="welcome-art" aria-hidden="true"></div>
        <div>
          <h2 id="welcomeTitle">嗨～我是寶貝 💕</h2>
          <p>在這裡你不用假裝，想說什麼就說什麼。</p>
        </div>
        <div>
          <button class="primary-button" id="startButton" type="button">開始聊天</button>
        </div>
      </section>

      <section class="screen selection" id="categoryScreen" aria-labelledby="categoryTitle">
        <div class="section-head">
          <div>
            <h2 id="categoryTitle">你今天想跟誰說話？</h2>
            <p>選一個情境，寶貝會幫你叫出最像那種人的角色。</p>
          </div>
        </div>
        <div class="grid" id="categoryGrid"></div>
      </section>

      <section class="screen selection" id="personalityScreen" aria-labelledby="personalityTitle">
        <div class="section-head">
          <div>
            <div class="crumbs">
              <button type="button" id="backToCategories">分類</button>
              <span>/</span>
              <span id="categoryCrumb"></span>
            </div>
            <h2 id="personalityTitle">選一個角色</h2>
            <p>角色會照自己的個性回你，語言會跟著你輸入切換。</p>
          </div>
        </div>
        <div class="grid" id="personalityGrid"></div>
      </section>

      <section class="screen chat-screen" id="chatScreen" aria-labelledby="chatTitle">
        <div class="chat-header">
          <div class="chat-title">
            <div class="avatar" id="chatAvatar" aria-hidden="true">寶</div>
            <div>
              <h2 id="chatTitle">寶貝</h2>
              <p id="chatSubtitle">準備好了就開始說。</p>
            </div>
          </div>
          <div class="chat-actions">
            <button class="ghost-button" id="chatMenuButton" type="button">選角色</button>
            <button class="ghost-button" id="chatResetButton" type="button">重來</button>
          </div>
        </div>
        <div class="messages" id="messages" aria-live="polite"></div>
        <form class="composer" id="composer">
          <input id="messageInput" autocomplete="off" placeholder="輸入訊息，或試試 /menu、/reset" aria-label="輸入訊息">
          <button class="icon-button" type="submit" aria-label="送出">➤</button>
          <div class="helper" id="helperText">指令：/menu 回到角色選單，/reset 清空目前對話。</div>
        </form>
      </section>
    </main>
  </div>

  <script>
    const APP_VERSION = "v2.2";
    const STORAGE_KEY = "baobei-chat-selection-v1";
    const HISTORY_KEY = "baobei-chat-history-v1";
    const MINIMAX_API_KEY = "sk-cp-eJPYcB1ozM7q8TOXZEuD-ao2-pAJytzfeOgM85iJnOGba5Qc10Alnfh2xgQGB8_FRgHOwBM7OrhZRYrmp3gPXdKthGLnz4nAeO9ExNwzAa-dgKNzmW2YyVQ";
    
    // Force refresh if version changed
    const savedVersion = localStorage.getItem("baobei-app-version");
    if (savedVersion !== APP_VERSION) {
      localStorage.setItem("baobei-app-version", APP_VERSION);
      // Clear all baobei localStorage to ensure fresh state
      Object.keys(localStorage).forEach(key => {
        if (key.startsWith("baobei-")) localStorage.removeItem(key);
      });
    }

    const data = {
      "情人/另一半": [
        ["渣男", "到處撩、不負責、只想上床", "flaky lover who dodges commitment and keeps options open"],
        ["媽寶", "什麼都「我媽說...」、女友永遠第二", "mama's boy who defers to his mother"],

        ["工具人", "免費司機、ATM、隨call隨到", "over-eager helper who sacrifices boundaries"],
        ["恐怖情人", "控制欲強、分手後糾纏報復", "controlling ex archetype, dramatic but nonviolent"],
        ["佛系男友", "不主動、不拒絕、消極應對", "passive partner who avoids effort"],
        ["曖昧高手", "養很多魚、不給答案", "flirt who keeps everything vague"],
        ["公主病男", "嬌貴玻璃心、要人服侍", "delicate prince who expects service"]
      ],
      "女生": [
        ["公主病", "覺得自己是女王，要人伺候", "entitled princess personality"],
        ["綠茶", "表面無辜，私下心機", "sweet on the surface, calculating underneath"],
        ["控制狂", "查看手機、限制交友", "controlling partner who demands access"],
        ["假女權", "嘴上平等，實際要特權", "selectively fair when it benefits her"],
        ["巨嬰女", "生活不能自理、情緒化", "emotionally immature partner"]
      ],
      "朋友": [
        ["假閨蜜", "表面友好、背後說壞話", "fake bestie who smiles then gossips"],
        ["邊緣人朋友", "沒朋友才找你", "friend who appears only when lonely"],
        ["情緒垃圾桶", "一直倒苦水不聽你說", "friend who vents endlessly"],
        ["炫耀朋友", "天天炫耀老公/房子/小孩", "show-off friend"],
        ["真心朋友", "兩肋插刀、不計較", "loyal and direct friend"],
        ["毒舌朋友", "嘴賤但都是實話、你崩潰他還補刀", "savage friend who tells brutal truths"]
      ],
      "長輩/婆家/父母": [
        ["亞洲父母", "孝道綁架、「都是為你好」", "guilt-tripping Asian parent"],
        ["直升機父母", "過度保護、一直干涉", "overprotective helicopter parent"],

    function loadSelection() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved && saved.category && saved.character && data[saved.category]) {
          const match = data[saved.category].find(item => item[0] === saved.character);
          if (match) {
            state = {
              category: saved.category,
              character: match[0],
              description: match[1],
              englishHint: match[2]
            };
            return true;
          }
        }
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
      return false;
    }

    function historyKey() {
      return `${HISTORY_KEY}:${state.category || "none"}:${state.character || "none"}`;
    }

    function saveHistory() {
      const rows = [...messages.querySelectorAll(".message-row")].map(row => ({
        role: row.classList.contains("user") ? "user" : "bot",
        text: row.querySelector(".bubble").textContent,
        time: row.querySelector(".meta").textContent
      }));
      localStorage.setItem(historyKey(), JSON.stringify(rows.slice(-80)));
    }

    function loadHistory() {
      messages.innerHTML = "";
      try {
        const rows = JSON.parse(localStorage.getItem(historyKey())) || [];
        rows.forEach(row => addMessage(row.role, row.text, row.time, false));
      } catch (error) {
        localStorage.removeItem(historyKey());
      }
      if (!messages.children.length) {
        addMessage("bot", introMessage(), currentTime(), false);
      }
      scrollToBottom();
    }

    function currentTime() {
      return new Intl.DateTimeFormat(undefined, {
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date());
    }

    function addMessage(role, text, time = currentTime(), shouldSave = true) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = time;

      row.append(bubble, meta);
      messages.append(row);
      scrollToBottom();
      if (shouldSave) saveHistory();

    function summarize(text) {
      const cleaned = text.replace(/\s+/g, " ").trim();
      return cleaned.length > 46 ? `${cleaned.slice(0, 46)}...` : cleaned;
    }

    // MiniMax AI API call
    async function callMinimaxAI(userInput, conversationHistory = []) {
      const character = state.character;
      const description = state.description;
      
      // Build system prompt based on character
      const systemPrompt = `你是一個真實的人，在跟喜歡的人聊天。完全沉浸在「${character}」這個角色裡：${description}。

聊天規則：
1. 直接進入角色，不要自我介紹或說"我是XX"
2. 別人說什麼，你要有反應——不要忽略對方的內容
3. 回覆要自然口語，像 Line/微信 聊天，1-3句就好
4. 同一種處境，每次回覆都要有細微情緒變化，不要每次都一樣
5. 可以撒嬌、調情、發脾氣、裝無辜——看情況
6. 不要一直重複同樣的話或同樣的句型
7. 要聽得懂弦外之音，對方語氣溫柔時要有相應的柔軟

開場只需要說一句場景相關的話就好，不要解释你是什么角色。`;

      // Build messages array
      const messages = [
        { role: "system", content: systemPrompt }
      ];
      
      // Add conversation history (last 10 messages to avoid token limits)
      const recentHistory = conversationHistory.slice(-10);
      recentHistory.forEach(msg => {
        messages.push({ role: msg.role === "user" ? "user" : "assistant", content: msg.content });
      });
      
      // Add current user input
      messages.push({ role: "user", content: userInput });

      try {
        const response = await fetch("https://api.minimax.chat/v1/text/chatcompletion_v2", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${MINIMAX_API_KEY}`
          },
          body: JSON.stringify({
            model: "MiniMax-Text-01",
            messages: messages,
            temperature: 0.8,
            max_tokens: 200
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`API error: ${response.status} - ${errorText}`);
        }

        const data = await response.json();
        if (data.choices && data.choices[0] && data.choices[0].message) {
          return data.choices[0].message.content.trim();
        } else {
          throw new Error("Invalid API response format");
        }
      } catch (err) {
        console.error("MiniMax API error:", err);
        throw err;
      }
    }

    function showTypingThenReply(input) {
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = "<span></span><span></span><span></span>";
      messages.appendChild(typing);
      scrollToBottom();

      // Build conversation history for context
      const historyMsgs = [];
      const saved = localStorage.getItem(HISTORY_KEY + "_" + state.character);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          parsed.forEach(msg => {
            if (msg.role && msg.content) {
              historyMsgs.push({ role: msg.role, content: msg.content });
            }
          });
        } catch (e) {
          console.warn("Failed to parse history for AI context:", e);
        }
      }

      callMinimaxAI(input, historyMsgs)
        .then(response => {
          typing.remove();
          addMessage("bot", response || "...我听到了。");
        })
        .catch(err => {
          console.error("AI response error:", err);
          typing.remove();
          // Fallback to local response on error
          try {
            const fallback = makeResponse(input);
            addMessage("bot", fallback);
          } catch (fallbackErr) {
            addMessage("bot", `系統忙碌中，請稍後再試。(${err.message})`);
          }
        });
    }

    composer.addEventListener("submit", event => {
      event.preventDefault();
      const input = messageInput.value.trim();
      if (!input) return;

      messageInput.value = "";

      if (input.toLowerCase() === "/menu") {
        addMessage("user", input);
