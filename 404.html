<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找不到頁面 | 寶貝 Chat</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: #30263b;
      background: linear-gradient(135deg, #fff7fb, #f8efff 60%, #f3fffb);
    }

    main {
      width: min(520px, 100%);
      text-align: center;
      padding: 2rem;
      border: 1px solid rgba(234, 219, 234, 0.9);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 16px 50px rgba(133, 85, 144, 0.17);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 4rem);
      letter-spacing: 0;
    }

    p {
      margin: 0.75rem 0 1.35rem;
      color: #75687f;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.6rem;
      padding: 0 1rem;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #f56fa8, #9a79ef);
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>這頁走丟了。回到寶貝 Chat，重新選一個角色繼續聊。</p>
    <a href="/">回首頁</a>
  </main>
</body>
</html>
