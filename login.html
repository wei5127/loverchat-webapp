<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入｜人生練習場</title>
  <meta name="description" content="登入人生練習場，開始與角色聊天">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #fff7fb 0%, #f8efff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    
    .card { background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
    
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { color: #75687f; font-size: 14px; }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #30263b; }
    .input-group input { width: 100%; padding: 14px 16px; border: 2px solid #eadbea; border-radius: 12px; font-size: 16px; transition: border-color 0.2s; outline: none; }
    .input-group input:focus { border-color: #f56fa8; }
    
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #f56fa8, #9a79ef); color: white; border: none; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, opacity 0.2s; }
    .btn-primary:hover { transform: scale(1.02); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    .divider { display: flex; align-items: center; margin: 24px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eadbea; }
    .divider span { padding: 0 16px; color: #75687f; font-size: 13px; }
    
    .google-btn { width: 100%; padding: 14px; background: white; border: 2px solid #4285f4; border-radius: 25px; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: transform 0.2s; }
    .google-btn:hover { transform: scale(1.02); background: #f8f8f8; }
    
    .anonymous-btn { width: 100%; padding: 14px; background: transparent; border: 2px solid #eadbea; border-radius: 25px; font-size: 16px; color: #75687f; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .anonymous-btn:hover { border-color: #9a79ef; color: #9a79ef; }
    
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .message { padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; text-align: center; }
    .message.error { background: #fef2f2; color: #dc2626; }
    .message.success { background: #f0fdf4; color: #16a34a; }
    
    .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eadbea; }
    .tab { flex: 1; padding: 12px; text-align: center; font-size: 15px; font-weight: 500; color: #75687f; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s, border-color 0.2s; }
    .tab.active { color: #f56fa8; border-bottom-color: #f56fa8; }
    
    .form-section { display: none; }
    .form-section.active { display: block; }
    
    .back-link { display: block; text-align: center; margin-top: 24px; color: #75687f; text-decoration: none; font-size: 14px; }
    .back-link:hover { color: #f56fa8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>人生練習場</h1>
      <p>登入後解鎖更多功能</p>
    </div>
    
    <div id="message" class="message" style="display:none;"></div>
    
    <div class="tabs">
      <div class="tab active" data-tab="login">登入</div>
      <div class="tab" data-tab="register">註冊</div>
    </div>
    
    <!-- Login Form -->
    <div class="form-section active" id="loginSection">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="emailLogin" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>密碼</label>
        <input type="password" id="passwordLogin" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="emailLoginBtn">登入</button>
    </div>
    
    <!-- Register Form -->
    <div class="form-section" id="registerSection">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="emailRegister" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>密碼</label>
        <input type="password" id="passwordRegister" placeholder="至少6個字元" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="emailRegisterBtn">註冊</button>
    </div>
    
    <div class="divider"><span>或</span></div>
    
    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.909-2.258c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.96H.957C.356 6.218 0 7.547 0 9s.356 2.783.957 4.04l2.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.04l2.007 2.332C4.672 4.164 6.56 3.58 9 3.58z"/>
      </svg>
      Google 登入
    </button>
    
    <div class="divider"><span>或</span></div>
    
    <button class="anonymous-btn" id="anonymousBtn">遊客身份繼續</button>
    
    <a href="index.html" class="back-link">← 回到首頁</a>
  </div>
  
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyBgCHhpBgJofh6fuEnFcy1CdQYxlCV-OUQ",
      authDomain: "loverchat-88cb3.firebaseapp.com",
      projectId: "loverchat-88cb3",
      storageBucket: "loverchat-88cb3.firebasestorage.app",
      messagingSenderId: "726884368190",
      appId: "1:726884368190:web:897b286fde11396928766f"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const functions = getFunctions(app);
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Section').classList.add('active');
        
        // Update Google button text based on tab
        const googleBtn = document.getElementById('googleBtn');
        if (tab.dataset.tab === 'register') {
          googleBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.909-2.258c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.96H.957C.356 6.218 0 7.547 0 9s.356 2.783.957 4.04l2.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.04l2.007 2.332C4.672 4.164 6.56 3.58 9 3.58z"/></svg> Google 註冊';
        } else {
          googleBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.909-2.258c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.96H.957C.356 6.218 0 7.547 0 9s.356 2.783.957 4.04l2.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.04l2.007 2.332C4.672 4.164 6.56 3.58 9 3.58z"/></svg> Google 登入';
        }
      });
    });
    
    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.style.display = 'block';
    }
    
    // Email Login
    document.getElementById('emailLoginBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailLogin').value.trim();
      const password = document.getElementById('passwordLogin').value;
      
      if (!email || !password) {
        showMessage('請填寫所有欄位', 'error');
        return;
      }
      
      const btn = document.getElementById('emailLoginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>登入中...';
      
      try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        showMessage('登入成功！', 'success');
        // Upgrade guest to free if needed
        const status = await httpsCallable(functions, 'getUserStatus')({});
        if (status.data?.plan === 'guest') {
          await httpsCallable(functions, 'upgradeToFree')({ email });
        }
        localStorage.setItem('lastLoginTime', Date.now().toString());
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (error) {
        let msg = '登入失敗';
        if (error.code === 'auth/user-not-found') msg = '帳號不存在';
        if (error.code === 'auth/wrong-password') msg = '密碼錯誤';
        if (error.code === 'auth/invalid-email') msg = 'Email 格式錯誤';
        showMessage(msg, 'error');
        btn.disabled = false;
        btn.textContent = '登入';
      }
    });
    
    // Email Register
    document.getElementById('emailRegisterBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailRegister').value.trim();
      const password = document.getElementById('passwordRegister').value;
      
      if (!email || !password) {
        showMessage('請填寫所有欄位', 'error');
        return;
      }
      
      if (password.length < 6) {
        showMessage('密碼至少需要 6 個字元', 'error');
        return;
      }
      
      const btn = document.getElementById('emailRegisterBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>註冊中...';
      
      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        // Upgrade to free immediately
        await httpsCallable(functions, 'upgradeToFree')({ email });
        showMessage('註冊成功！', 'success');
        if (typeof gtag === 'function') {
          gtag('event', 'register_success', { method: 'email' });
        }
        localStorage.setItem('lastLoginTime', Date.now().toString());
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (error) {
        let msg = '註冊失敗';
        if (error.code === 'auth/email-already-in-use') msg = '此 Email已被註冊';
        if (error.code === 'auth/invalid-email') msg = 'Email 格式錯誤';
        showMessage(msg, 'error');
        btn.disabled = false;
        btn.textContent = '註冊';
      }
    });
    
    // Google Sign-In
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading" style="border-color:rgba(66,133,244,0.3);border-top-color:#4285F4;"></span>處理中...';
      
      try {
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        showMessage('Google 登入成功！', 'success');
        if (typeof gtag === 'function') {
          gtag('event', 'register_success', { method: 'google' });
        }
        localStorage.setItem('lastLoginTime', Date.now().toString());
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (error) {
        console.error('Google sign-in error:', error);
        let msg = 'Google 登入失敗';
        if (error.code === 'auth/popup-closed-by-user') msg = '已取消';
        if (error.code === 'auth/account-exists-with-different-credential') msg = '此 email 已有其他登入方式';
        if (error.code === 'auth/unauthorized-domain') msg = '網域未授權，請聯繫網站管理員';
        if (error.code === 'auth/cancelled-popup-request') msg = '取消了，請重試';
        showMessage(msg + (error.message ? ': ' + error.message : ''), 'error');
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.909-2.258c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.96H.957C.356 6.218 0 7.547 0 9s.356 2.783.957 4.04l2.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.04l2.007 2.332C4.672 4.164 6.56 3.58 9 3.58z"/></svg> Google 登入`;
      }
    });
    
    // Anonymous
    document.getElementById('anonymousBtn').addEventListener('click', async () => {
      const btn = document.getElementById('anonymousBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>進入中...';
      
      try {
        await signInAnonymously(auth);
        setTimeout(() => window.location.href = 'index.html', 500);
      } catch (error) {
        showMessage('無法以遊客身份繼續', 'error');
        btn.disabled = false;
        btn.textContent = '遊客身份繼續';
      }
    });
    
    // If already logged in, redirect
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
